name: CI/CD Pipeline

on:
  push:
    branches:
      - deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/front-despacho:latest

  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to EC2 instance
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Descargar la última imagen desde Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/front-despacho:latest
            
            # Detener y eliminar el contenedor anterior si existe
            docker stop front-despacho-app || true
            docker rm front-despacho-app || true
            
            # Levantar el nuevo contenedor
            docker run -d -p 8080:80 --name front-despacho-app --restart unless-stopped ${{ secrets.DOCKER_USERNAME }}/front-despacho:latest
