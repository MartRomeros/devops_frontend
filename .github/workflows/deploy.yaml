name: CI/CD Frontend - Build, Push and Deploy

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/front-despacho

jobs:
  build-and-push:
    name: Build and Push Frontend Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            APP_DIR="/home/${{ secrets.EC2_USER }}/devops_frontend"
            IMAGE_NAME="${{ env.IMAGE_NAME }}"
            CONTAINER_NAME="front-despacho"
            REPOSITORY_URL="https://github.com/${{ github.repository }}.git"

            command -v git >/dev/null 2>&1 || {
              echo "git is required on the EC2 instance."
              exit 1
            }

            command -v docker >/dev/null 2>&1 || {
              echo "docker is required on the EC2 instance."
              exit 1
            }

            if docker ps >/dev/null 2>&1; then
              DOCKER="docker"
            elif sudo -n docker ps >/dev/null 2>&1; then
              DOCKER="sudo docker"
            else
              echo "docker exists, but the EC2 user cannot run it."
              exit 1
            fi

            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git fetch origin master
              git pull --ff-only origin master
            elif [ ! -e "$APP_DIR" ] || [ -z "$(ls -A "$APP_DIR" 2>/dev/null)" ]; then
              git clone "$REPOSITORY_URL" "$APP_DIR"
              cd "$APP_DIR"
            else
              echo "$APP_DIR exists but is not a git repository."
              exit 1
            fi

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | $DOCKER login \
              --username "${{ secrets.DOCKERHUB_USERNAME }}" \
              --password-stdin

            $DOCKER pull "$IMAGE_NAME:latest"
            $DOCKER rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true
            $DOCKER run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p 80:80 \
              -e APP_VENTAS_API_URL="${{ secrets.APP_VENTAS_API_URL }}" \
              -e APP_DESPACHOS_API_URL="${{ secrets.APP_DESPACHOS_API_URL }}" \
              "$IMAGE_NAME:latest"
